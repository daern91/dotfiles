- defaults:
    link:
      relink: true
      force: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.tmux.conf: .tmux.conf
    # ~/.vim: .vim
    ~/.gitconfig: .gitconfig
    ~/.vimrc: .vimrc
    ~/.zshrc: .zshrc
    ~/.config/ghostty/config: ghostty.config
    ~/.config/nvim/init.lua: init.lua

- create:
    - ~/downloads
    - ~/.vim/undodir
    - ~/.config/nvim
    - ~/.config/ghostty
